spring:
  application:
    name: base
  jackson:
    time-zone: Asia/Ho_Chi_Minh

  # PostgreSQL Connection Configuration
  datasource:
    url: jdbc:mysql://localhost:3306/base_spring?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh
    username: root
    password: admin
    driver-class-name: com.mysql.cj.jdbc.Driver

  # JPA/Hibernate Configuration
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  # CORS configuration
  cors:
    allowed-origins: http://localhost:5173
    allowed-methods: GET,POST,PUT,DELETE,OPTIONS
    allowed-headers: "*"
    allow-credentials: true

  # Redis configuration
  cache:
    type: redis
    redis:
      key-prefix: custom-prefix
      time-to-live: 60000
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 300ms

# Config jwt
jwt:
  base64-secret: TDztjuiGG+/hJplhARIzotz+eTCq7QpHz1XNN1g5QlaA41Ack3ybKFp/fbs5LLdH5zX+/WKIh6/1Z7jEJn2umA==
  token-expiration-in-seconds: 900
  algorithm: HS512
  refresh-token-expiration-in-seconds: 604800

